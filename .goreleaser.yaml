version: 2

project_name: pod-doctor

before:
  hooks:
    - go mod tidy

builds:
  - id: pod-doctor
    main: ./cmd/pod-doctor
    binary: pod-doctor
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/NoobCoder1209/k8s-pod-doctor/internal/version.Version={{.Version}}
      - -X github.com/NoobCoder1209/k8s-pod-doctor/internal/version.Commit={{.ShortCommit}}
      - -X github.com/NoobCoder1209/k8s-pod-doctor/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    # Drop {{ .Version }} from the name so README's `latest/download/`
    # URLs (which don't include a version) keep working across releases.
    name_template: '{{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}'
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

# Homebrew tap. Requires HOMEBREW_TAP_GITHUB_TOKEN repo secret with write
# access to github.com/NoobCoder1209/homebrew-tap. The release workflow
# passes that secret through; see .github/workflows/release.yml.
brews:
  - name: pod-doctor
    repository:
      owner: NoobCoder1209
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    homepage: https://github.com/NoobCoder1209/k8s-pod-doctor
    description: One command to diagnose a sick Kubernetes pod
    license: MIT
    test: |
      system "#{bin}/pod-doctor", "version"
