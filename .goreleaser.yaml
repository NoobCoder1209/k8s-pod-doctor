version: 2

project_name: pod-doctor

before:
  hooks:
    - go mod tidy

builds:
  - id: pod-doctor
    main: ./cmd/pod-doctor
    binary: pod-doctor
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/NoobCoder1209/k8s-pod-doctor/internal/version.Version={{.Version}}
      - -X github.com/NoobCoder1209/k8s-pod-doctor/internal/version.Commit={{.ShortCommit}}
      - -X github.com/NoobCoder1209/k8s-pod-doctor/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

