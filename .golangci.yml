run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - misspell
    - unconvert

linters-settings:
  goimports:
    local-prefixes: github.com/NoobCoder1209/k8s-pod-doctor

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
